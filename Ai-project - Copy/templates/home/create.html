{% extends 'base.html' %}

{% block content %}

{% include 'nav.html' %}

<div class="container d-flex justify-content-center align-items-center vh-100">

    <div class="card shadow-lg p-4 rounded-4" style="width: 500px;">

        <h2 class="text-center mb-4">Create Product</h2>

        <form method="post">
            {% csrf_token %}

            <div class="mb-3">
                <label for="name" class="form-label">
                    Product Name
                </label>

                <input 
                    type="text"
                    name="name"
                    id="name"
                    class="form-control"
                    placeholder="Enter product name"
                />
            </div>

            <div class="mb-3">
                <label for="description" class="form-label">
                    Description
                </label>

                <textarea 
                    name="description"
                    id="description"
                    class="form-control"
                    rows="4"
                    placeholder="Enter product description"
                ></textarea>
            </div>

            <div class="mb-3">
                <label for="price" class="form-label">
                    Price
                </label>

                <input 
                    type="number"
                    name="price"
                    id="price"
                    class="form-control"
                    placeholder="Enter product price"
                />
            </div>

            <button type="submit" class="btn btn-success w-100">
                Create Product
            </button>
        </form>

    </div>

</div>

{% endblock %}
